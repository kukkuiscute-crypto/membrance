name: Build & Release Desktop + Android

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # =====================================================
  # DESKTOP BUILDS — Windows / macOS / Linux (x64 + arm64)
  # =====================================================
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            ext: zip
          - os: windows-latest
            platform: win32
            arch: arm64
            ext: zip
          - os: macos-latest
            platform: darwin
            arch: x64
            ext: zip
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: zip
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: tar.gz
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npm run build
      - name: Package Electron app
        run: npx @electron/packager . "MEMBRANCE" --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out=electron-release --overwrite --ignore="^/src" --ignore="^/public" --ignore="^/electron-release" --ignore="^/.github"
      - name: Archive (zip)
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          cd electron-release
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            zip -ry "../MEMBRANCE-${{ matrix.platform }}-${{ matrix.arch }}.zip" "MEMBRANCE-${{ matrix.platform }}-${{ matrix.arch }}"
          else
            7z a "../MEMBRANCE-${{ matrix.platform }}-${{ matrix.arch }}.zip" "MEMBRANCE-${{ matrix.platform }}-${{ matrix.arch }}/*"
          fi
      - name: Archive (tar.gz)
        if: matrix.ext == 'tar.gz'
        run: tar czf MEMBRANCE-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz -C electron-release MEMBRANCE-${{ matrix.platform }}-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: MEMBRANCE-${{ matrix.platform }}-${{ matrix.arch }}
          path: MEMBRANCE-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.ext }}

  # =====================================================
  # ANDROID APK BUILD (via Capacitor)
  # =====================================================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm install
      - run: npm install -D @capacitor/core @capacitor/cli @capacitor/android
      - run: npm run build
      - name: Init Capacitor (if missing)
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "MEMBRANCE" "app.lovable.ca53d69ada024454830d198483303675" --web-dir=dist
          fi
      - name: Add Android platform
        run: npx cap add android || true
      - run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease || ./gradlew assembleDebug
      - name: Find APK
        id: findapk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          cp "$APK" MEMBRANCE-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: MEMBRANCE-android
          path: MEMBRANCE-android.apk

  # =====================================================
  # PUBLISH RELEASE
  # =====================================================
  release:
    needs: [desktop, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.apk" \) -exec mv {} . \;
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            MEMBRANCE-*.zip
            MEMBRANCE-*.tar.gz
            MEMBRANCE-android.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
